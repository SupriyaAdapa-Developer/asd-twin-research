name: tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Generate synthetic dataset
        run: python data/data_generation.py --seed 42 --n-children 184

      - name: Run pytest
        run: pytest tests/ -v --tb=short

      - name: Lint with ruff
        run: |
          pip install ruff
          ruff check src/ tests/ data/

  reproducibility:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Verify deterministic data generation
        run: |
          python data/data_generation.py --seed 42 --n-children 50 --out-dir /tmp/run1
          python data/data_generation.py --seed 42 --n-children 50 --out-dir /tmp/run2
          diff /tmp/run1/sessions.csv /tmp/run2/sessions.csv && echo "✓ Deterministic"
          diff /tmp/run1/synthetic_cohort.csv /tmp/run2/synthetic_cohort.csv && echo "✓ Cohort identical"
          diff /tmp/run1/environmental.csv /tmp/run2/environmental.csv && echo "✓ Env identical"
